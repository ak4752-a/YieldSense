[server]
headless = true
port = 8501
# Render proxies requests through its edge network; disabling CORS and XSRF
# protection is the standard configuration for Streamlit apps hosted on Render.
enableCORS = false
enableXsrfProtection = false

[theme]
base = "light"
primaryColor = "#2E7D32"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F1F8E9"
textColor = "#1B2631"
font = "sans serif"
